<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Project KIZUNA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@400;700&family=Share+Tech+Mono&display=swap');

:root {
  --cyan:#00f2ff; --pink:#ff00c1; --gold:#ffd700; --green:#00ff88;
  --red:#ff4466; --dark:#020617; --ink:#0a0f1e; --paper:#f0ede8;
  --panel:rgba(2,6,23,0.94);
}
*{box-sizing:border-box;margin:0;padding:0;}

/* ── BASE ── */
body{background:var(--dark);font-family:'Share Tech Mono',monospace;
  height:100vh;overflow:hidden;color:white;}

/* Scanlines */
body::after{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);
  pointer-events:none;z-index:9999;}

/* ── SCENE BG ── */
#scene-bg{position:fixed;inset:0;background-size:cover;background-position:center;
  filter:brightness(0.25) saturate(1.6);transition:background-image 1s;}
#scene-bg::after{content:'';position:absolute;inset:0;
  background:linear-gradient(to top,var(--dark) 0%,transparent 40%,var(--dark) 100%);}

/* ══════════════════════════════════════════════════
   HUD
══════════════════════════════════════════════════ */
#hud{position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:100;
  display:flex;align-items:center;gap:0.5rem;
  padding:0.4rem 0.7rem;
  background:linear-gradient(to bottom,rgba(2,6,23,0.95),transparent);}
#hud-lv{font-family:'Orbitron','Share Tech Mono',monospace;font-size:0.72rem;
  color:var(--cyan);letter-spacing:0.15em;white-space:nowrap;flex-shrink:0;}
#prog-track{flex:1;height:3px;background:rgba(255,255,255,0.1);border-radius:9px;}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink));
  border-radius:9px;transition:width 0.7s ease;}
#hud-arc{font-size:0.68rem;color:rgba(255,255,255,0.3);white-space:nowrap;flex-shrink:0;}
/* Lexicon button */
#btn-lex{width:28px;height:28px;border-radius:50%;background:rgba(255,215,0,0.12);
  border:1px solid rgba(255,215,0,0.4);color:var(--gold);font-size:0.85rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;}
#btn-lex:hover{background:var(--gold);color:black;}

/* ══════════════════════════════════════════════════
   MAIN SCROLL AREA
══════════════════════════════════════════════════ */
#scroll-area{position:relative;z-index:10;
  max-width:480px;margin:0 auto;
  height:100vh;overflow-y:auto;overflow-x:hidden;
  padding:3rem 0.6rem 8rem;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;}
#scroll-area::-webkit-scrollbar{width:3px;}
#scroll-area::-webkit-scrollbar-thumb{background:rgba(0,242,255,0.3);border-radius:9px;}

/* ══════════════════════════════════════════════════
   MANGA PANELS
══════════════════════════════════════════════════ */
.manga-panel{
  background:rgba(10,15,30,0.7);
  border:2px solid rgba(0,242,255,0.12);
  border-radius:6px;
  margin-bottom:0.75rem;
  overflow:hidden;
  animation:panel-in 0.35s ease both;
}
@keyframes panel-in{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

/* Scene hero panel — near-full viewport height */
.panel-scene{position:relative;height:72vh;min-height:280px;max-height:480px;
  background:transparent !important;}
.panel-scene-bg{position:absolute;inset:0;background-size:cover;background-position:center;
  filter:brightness(0.55) saturate(1.4);}
.panel-scene-overlay{position:absolute;inset:0;
  background:linear-gradient(to top,rgba(2,6,23,1) 0%,rgba(2,6,23,0.5) 45%,rgba(2,6,23,0.1) 100%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:1.1rem;}
.panel-arc{font-family:'Bangers',cursive;font-size:0.75rem;color:var(--pink);
  letter-spacing:0.25em;margin-bottom:0.3rem;text-transform:uppercase;}
.panel-title{font-family:'Bangers',cursive;font-size:2rem;color:white;
  text-shadow:3px 3px 0 var(--pink),-1px -1px 0 var(--cyan);line-height:1.1;margin-bottom:0.5rem;}
/* Scroll hint arrow */
.panel-scene-scroll{font-size:0.65rem;color:rgba(0,242,255,0.5);
  letter-spacing:0.15em;animation:bounce 2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(4px);}}

/* Story panel — separate from image so user scrolls to it */
.panel-story-block{padding:0.9rem 1rem;background:rgba(2,6,23,0.85);}
.panel-story-text{font-size:0.84rem;color:rgba(255,255,255,0.88);line-height:1.7;}

/* Context panel */
.panel-context{padding:0.7rem 0.9rem;
  background:rgba(255,0,193,0.05);
  border-left:3px solid var(--pink);}
.panel-context-label{font-size:0.68rem;color:var(--pink);letter-spacing:0.15em;margin-bottom:0.3rem;}
.panel-context-text{font-size:0.78rem;color:rgba(255,255,255,0.6);line-height:1.6;font-style:italic;}

/* Speech bubble panel */
.panel-speech{padding:0.75rem 0.9rem;}
.bubble-row{display:flex;align-items:flex-end;gap:0.55rem;margin-bottom:0.5rem;}
.bubble-row.player{flex-direction:row-reverse;}

.avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  border:2px solid rgba(0,242,255,0.3);background:rgba(0,242,255,0.05);}
.avatar.hana{border-color:rgba(255,0,193,0.4);background:rgba(255,0,193,0.05);}
.avatar.ken{border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.05);}
.avatar.zero{border-color:rgba(255,68,102,0.3);background:rgba(255,68,102,0.05);}
.avatar.core{border-color:rgba(0,255,136,0.4);background:rgba(0,255,136,0.05);}
.avatar.teacher{border-color:rgba(180,180,255,0.4);background:rgba(180,180,255,0.05);}

.bubble{position:relative;padding:0.55rem 0.75rem;border-radius:12px;
  max-width:calc(100% - 54px);cursor:pointer;transition:transform 0.15s;}
.bubble:hover{transform:scale(1.02);}
/* Tail */
.bubble-row:not(.player) .bubble{background:rgba(15,25,50,0.9);
  border:1.5px solid rgba(0,242,255,0.25);border-radius:0 12px 12px 12px;}
.bubble-row.player .bubble{background:rgba(30,20,50,0.9);
  border:1.5px solid rgba(255,0,193,0.25);border-radius:12px 0 12px 12px;}

.bubble-speaker{font-size:0.65rem;color:var(--cyan);letter-spacing:0.1em;
  text-transform:uppercase;margin-bottom:0.2rem;}
.bubble-row.player .bubble-speaker{color:var(--pink);}

/* Japanese text in bubble — ruby sits above, baseline stays level */
.bubble-jp{font-family:'Noto Sans JP',sans-serif;font-size:1.1rem;
  font-weight:700;line-height:2.2;color:white;}
.bubble-jp ruby{display:ruby;ruby-position:over;}
.bubble-jp ruby rt{display:ruby-text;font-size:0.62rem;
  font-family:'Share Tech Mono',monospace;
  color:var(--gold);font-weight:400;letter-spacing:0.02em;}
.bubble-jp .w-new{color:var(--gold);}
.bubble-jp .w-seen{color:rgba(255,255,255,0.9);}

/* Audio indicator */
.audio-btn{display:inline-flex;align-items:center;gap:0.3rem;
  margin-top:0.35rem;font-size:0.68rem;color:rgba(0,242,255,0.6);
  cursor:pointer;letter-spacing:0.05em;}
.audio-btn::before{content:'▶';font-size:0.6rem;}
.audio-btn.playing{color:var(--cyan);animation:blink 0.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* Exchange prompt bar */
.prompt-bar{margin:0.5rem 0 0.4rem;padding:0.5rem 0.7rem;
  background:rgba(255,215,0,0.06);border-left:2px solid var(--gold);
  font-size:0.78rem;color:rgba(255,215,0,0.85);line-height:1.45;}

/* ══════════════════════════════════════════════════
   CHOICE PANEL — visual + text
══════════════════════════════════════════════════ */
.panel-choices{padding:0.6rem 0.8rem 0.8rem;}
.choices-grid{display:grid;gap:0.5rem;}
.choices-grid.visual{grid-template-columns:1fr 1fr 1fr;}
.choices-grid.text{grid-template-columns:1fr;}

/* Visual choice */
.choice-visual{
  display:flex;flex-direction:column;align-items:center;gap:0.35rem;
  padding:0.75rem 0.3rem;
  background:rgba(30,41,59,0.5);
  border:2px solid rgba(0,242,255,0.2);
  border-radius:8px;cursor:pointer;
  transition:all 0.18s;font-size:0.75rem;text-align:center;
  color:rgba(255,255,255,0.75);}
.choice-visual .emoji{font-size:2.2rem;line-height:1;}
.choice-visual:hover{border-color:var(--cyan);background:rgba(0,242,255,0.1);}
.choice-visual.correct{border-color:var(--green)!important;background:rgba(0,255,136,0.12)!important;animation:flash-ok 0.4s;}
.choice-visual.wrong{border-color:var(--red)!important;animation:shake 0.35s;opacity:0.35;}
@keyframes flash-ok{0%{background:rgba(0,255,136,0.45);}100%{background:rgba(0,255,136,0.12);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

/* Text choice */
.choice-text{
  padding:0.7rem 0.9rem;
  background:rgba(30,41,59,0.5);
  border:none;border-left:3px solid var(--cyan);
  color:white;font-family:'Noto Sans JP',sans-serif;font-size:0.88rem;
  text-align:left;cursor:pointer;transition:all 0.18s;border-radius:0 4px 4px 0;width:100%;}
.choice-text:hover{background:var(--cyan);color:black;transform:translateX(3px);}
.choice-text.correct{border-left-color:var(--green);background:rgba(0,255,136,0.12);}
.choice-text.wrong{border-left-color:var(--red);animation:shake 0.35s;opacity:0.35;}

/* Feedback bar */
.feedback-bar{margin-top:0.45rem;padding:0.4rem 0.6rem;border-radius:4px;
  font-size:0.75rem;line-height:1.45;opacity:0;transition:opacity 0.25s;min-height:1.8rem;}
.feedback-bar.good{opacity:1;color:var(--green);background:rgba(0,255,136,0.07);
  border:1px solid rgba(0,255,136,0.2);}
.feedback-bar.bad{opacity:1;color:#ffaa88;background:rgba(255,100,60,0.07);
  border:1px solid rgba(255,100,60,0.2);}

/* ══════════════════════════════════════════════════
   BOTTOM KIBI BAR (fixed)
══════════════════════════════════════════════════ */
#kibi-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:200;
  padding:0.5rem 0.7rem;
  background:linear-gradient(to top,rgba(2,6,23,0.98) 70%,transparent);}
.kibi-inner{display:flex;align-items:flex-end;gap:0.55rem;}
#kibi-avatar{width:42px;height:42px;border-radius:50%;
  border:2px solid var(--cyan);box-shadow:0 0 8px var(--cyan);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  flex-shrink:0;background:rgba(0,242,255,0.05);animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--cyan);}50%{box-shadow:0 0 18px var(--cyan),0 0 36px rgba(0,242,255,0.2);}}
#kibi-text{flex:1;background:rgba(0,242,255,0.06);border:1px solid rgba(0,242,255,0.22);
  border-radius:0 10px 10px 10px;padding:0.45rem 0.7rem;
  font-size:0.78rem;color:rgba(255,255,255,0.75);line-height:1.5;}

/* ══════════════════════════════════════════════════
   VISUAL LEXICON OVERLAY
══════════════════════════════════════════════════ */
#lexicon{position:fixed;inset:0;z-index:500;
  display:flex;flex-direction:column;
  background:rgba(2,6,23,0.97);
  transform:translateY(100%);transition:transform 0.35s ease;}
#lexicon.open{transform:translateY(0);}
#lex-header{display:flex;align-items:center;justify-content:space-between;
  padding:0.8rem 1rem;border-bottom:1px solid rgba(0,242,255,0.15);}
#lex-title{font-family:'Bangers',cursive;font-size:1.4rem;color:var(--gold);
  letter-spacing:0.1em;text-shadow:2px 2px 0 rgba(255,215,0,0.2);}
#lex-count{font-size:0.75rem;color:rgba(255,255,255,0.3);}
#btn-lex-close{padding:0.35rem 0.8rem;background:transparent;
  border:1px solid rgba(0,242,255,0.3);color:var(--cyan);
  font-family:'Share Tech Mono',monospace;font-size:0.75rem;cursor:pointer;border-radius:4px;}
#lex-grid{flex:1;overflow-y:auto;padding:0.8rem;
  display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;align-content:start;}
.lex-card{display:flex;flex-direction:column;align-items:center;gap:0.25rem;
  padding:0.5rem 0.2rem;background:rgba(255,215,0,0.05);
  border:1px solid rgba(255,215,0,0.15);border-radius:6px;
  text-align:center;animation:pop-in 0.3s ease both;}
@keyframes pop-in{from{transform:scale(0.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.lex-card .lex-emoji{font-size:1.8rem;}
.lex-card .lex-jp{font-family:'Noto Sans JP',sans-serif;font-size:0.78rem;
  font-weight:700;color:var(--gold);}
.lex-card .lex-romaji{font-size:0.68rem;color:rgba(255,255,255,0.4);}
#lex-empty{padding:2rem;text-align:center;color:rgba(255,255,255,0.2);font-size:0.78rem;}

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
#toast{position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.85);
  background:rgba(2,6,23,0.97);border:2px solid var(--cyan);
  box-shadow:0 0 40px rgba(0,242,255,0.3);
  padding:1.3rem 1.6rem;border-radius:8px;text-align:center;
  max-width:300px;width:90%;z-index:600;
  opacity:0;pointer-events:none;transition:all 0.22s;}
#toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:all;}
#toast-icon{font-size:2rem;margin-bottom:0.5rem;}
#toast-text{color:rgba(255,255,255,0.9);line-height:1.7;margin-bottom:1rem;
  font-size:0.82rem;white-space:pre-line;}
#toast-btn{padding:0.48rem 1.3rem;background:var(--cyan);border:none;color:black;
  font-family:'Share Tech Mono',monospace;font-size:0.75rem;font-weight:700;
  letter-spacing:0.1em;cursor:pointer;border-radius:4px;}
</style>
</head>
<body>

<div id="scene-bg"></div>

<!-- HUD -->
<div id="hud">
  <span id="hud-lv">LV 01</span>
  <div id="prog-track"><div id="prog-fill" style="width:4%"></div></div>
  <span id="hud-arc">ARC 1</span>
  <button id="btn-lex" onclick="toggleLexicon()" title="Word Collection">📖</button>
</div>

<!-- MANGA SCROLL -->
<div id="scroll-area"></div>

<!-- KIBI BAR -->
<div id="kibi-bar">
  <div class="kibi-inner">
    <div id="kibi-avatar">🤖</div>
    <div id="kibi-text">Initialising KIZUNA system...</div>
  </div>
</div>

<!-- LEXICON -->
<div id="lexicon">
  <div id="lex-header">
    <div>
      <div id="lex-title">📖 WORD COLLECTION</div>
      <div id="lex-count">0 words acquired</div>
    </div>
    <button id="btn-lex-close" onclick="toggleLexicon()">✕ CLOSE</button>
  </div>
  <div id="lex-grid"><div id="lex-empty">No words collected yet.<br>Tap speech bubbles to hear them<br>and complete exchanges to collect!</div></div>
</div>

<!-- TOAST -->
<div id="toast">
  <div id="toast-icon">✓</div>
  <div id="toast-text"></div>
  <button id="toast-btn" onclick="dismissToast()">続ける — CONTINUE</button>
</div>

<script>
// ══════════════════════════════════════════════════════════
// VOCABULARY — every word: emoji, Japanese, romaji, meaning
// Words with emoji appear in the Visual Lexicon
// ══════════════════════════════════════════════════════════
const VOCAB = {
  watashi:  {jp:"わたし", rom:"watashi",  en:"I / me",          emoji:"🙋"},
  kibi:     {jp:"キビ",   rom:"Kibi",     en:"Kibi (the AI)",   emoji:"🤖"},
  desu:     {jp:"です",   rom:"desu",     en:"am / is / are",   emoji:null},
  ka:       {jp:"か",     rom:"ka",       en:"? (question)",    emoji:null},
  wa:       {jp:"は",     rom:"wa",       en:"topic marker",    emoji:null},
  ga:       {jp:"が",     rom:"ga",       en:"subject marker",  emoji:null},
  hai:      {jp:"はい",   rom:"hai",      en:"yes",             emoji:"✅"},
  iie:      {jp:"いいえ", rom:"iie",      en:"no",              emoji:"❌"},
  kore:     {jp:"これ",   rom:"kore",     en:"this",            emoji:"👇"},
  mizu:     {jp:"みず",   rom:"mizu",     en:"water",           emoji:"💧"},
  nomimasu: {jp:"のみます",rom:"nomimasu", en:"drink",           emoji:"🥤"},
  nomimasen:{jp:"のみません",rom:"nomimasen",en:"don't drink",   emoji:null},
  anata:    {jp:"あなた", rom:"anata",    en:"you",             emoji:"👤"},
  dare:     {jp:"だれ",   rom:"dare",     en:"who?",            emoji:"❓"},
  doko:     {jp:"どこ",   rom:"doko",     en:"where?",          emoji:"📍"},
  asoko:    {jp:"あそこ", rom:"asoko",    en:"over there",      emoji:"👉"},
  koko:     {jp:"ここ",   rom:"koko",     en:"here",            emoji:"📌"},
  sumimasen:{jp:"すみません",rom:"sumimasen",en:"excuse me",    emoji:"🙏"},
  eki:      {jp:"えき",   rom:"eki",      en:"station",         emoji:"🚉"},
  irasshaimase:{jp:"いらっしゃいませ",rom:"irasshaimase",en:"welcome!",emoji:"🏪"},
  bento:    {jp:"べんとう",rom:"bento",   en:"lunch box",       emoji:"🍱"},
  kudasai:  {jp:"ください",rom:"kudasai", en:"please give",     emoji:"🤲"},
  teki:     {jp:"てき",   rom:"teki",     en:"enemy",           emoji:"👾"},
  aoi:      {jp:"あおい", rom:"aoi",      en:"blue",            emoji:"🫐"},
  ookii:    {jp:"おおきい",rom:"ookii",   en:"big",             emoji:"🔵"},
  chiisai:  {jp:"ちいさい",rom:"chiisai", en:"small",           emoji:"🔹"},
  ima:      {jp:"いま",   rom:"ima",      en:"now",             emoji:"⏰"},
  nanji:    {jp:"なんじ", rom:"nanji",    en:"what time?",      emoji:"🕰️"},
  kuji:     {jp:"くじ",   rom:"kuji",     en:"9 o'clock",       emoji:"🕘"},
  sakka:    {jp:"サッカー",rom:"sakka-",  en:"soccer",          emoji:"⚽"},
  shimasu:  {jp:"します", rom:"shimasu",  en:"do / play",       emoji:"🎮"},
  tabemasu: {jp:"たべます",rom:"tabemasu",en:"eat",             emoji:"🍜"},
  oishii:   {jp:"おいしい",rom:"oishii",  en:"delicious!",      emoji:"😋"},
  hon:      {jp:"ほん",   rom:"hon",      en:"book",            emoji:"📚"},
  tsukue:   {jp:"つくえ", rom:"tsukue",   en:"desk",            emoji:"🪑"},
  ue:       {jp:"うえ",   rom:"ue",       en:"on top",          emoji:"⬆️"},
  fukuro:   {jp:"ふくろ", rom:"fukuro",   en:"bag",             emoji:"🛍️"},
  irimasu:  {jp:"いります", rom:"irimasu",  en:"need",           emoji:null},
  kekkou:   {jp:"けっこう",rom:"kekkou",  en:"no thanks",       emoji:"🙅"},
  nani:     {jp:"なに",   rom:"nani",     en:"what?",           emoji:"🤷"},
  benkyou:  {jp:"べんきょう",rom:"benkyou",en:"studying",       emoji:"📖"},
  kono:     {jp:"この",   rom:"kono",     en:"this (adj)",      emoji:"👇"},
  furui:    {jp:"ふるい", rom:"furui",    en:"old",             emoji:"🕰️"},
  atarashii:{jp:"あたらしい",rom:"atarashii",en:"new",          emoji:"✨"},
  kakkoii:  {jp:"かっこいい",rom:"kakkoii",en:"cool!",          emoji:"😎"},
  ikaga:    {jp:"いかが", rom:"ikaga",    en:"how is it?",      emoji:"🤔"},
  ame:      {jp:"あめ",   rom:"ame",      en:"rain",            emoji:"🌧️"},
  samui:    {jp:"さむい", rom:"samui",    en:"cold",            emoji:"🥶"},
  atsui:    {jp:"あつい", rom:"atsui",    en:"hot",             emoji:"🔥"},
  sou:      {jp:"そう",   rom:"sou",      en:"that's right",    emoji:"👍"},
  ne:       {jp:"ね",     rom:"ne",       en:"right? (agree)",  emoji:null},
  anime:    {jp:"アニメ", rom:"anime",    en:"anime",           emoji:"🎌"},
  suki:     {jp:"すき",   rom:"suki",     en:"like",            emoji:"💙"},
  daisuki:  {jp:"だいすき",rom:"daisuki", en:"love it!",        emoji:"❤️"},
  arigatou: {jp:"ありがとう",rom:"arigatou",en:"thank you",     emoji:"🙏"},
  hito:     {jp:"ひと",   rom:"hito",     en:"person / people", emoji:"👥"},

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
const seenWords   = new Set();
const lexiconData = [];  // {key, jp, rom, en, emoji}
let currentLevel    = 0;
let currentExchange = 0;
let busy            = false;
let toastCb         = null;
let ttsSupported    = false;

// ══════════════════════════════════════════════════════════
// TTS — Web Speech API
// ══════════════════════════════════════════════════════════
function initTTS() {
  if (!('speechSynthesis' in window)) return;
  ttsSupported = true;
  // Trigger voice list load — needed on Chrome where voices load async
  window.speechSynthesis.getVoices();
}

function speak(text) {
  if (!ttsSupported) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.85;
  utter.pitch = 1.1;
  // Prefer a Japanese voice if available, but always speak regardless
  const voices = window.speechSynthesis.getVoices();
  const jpVoice = voices.find(v => v.lang && v.lang.startsWith('ja'));
  if (jpVoice) utter.voice = jpVoice;
  window.speechSynthesis.speak(utter);
}

// ══════════════════════════════════════════════════════════
// LEXICON
// ══════════════════════════════════════════════════════════
function addToLexicon(key) {
  if (!VOCAB[key]) return;
  if (lexiconData.find(w => w.key === key)) return;
  const v = VOCAB[key];
  lexiconData.push({key, ...v});
  renderLexicon();
}

function renderLexicon() {
  const grid = document.getElementById('lex-grid');
  const empty = document.getElementById('lex-empty');
  document.getElementById('lex-count').textContent = `${lexiconData.length} words acquired`;

  if (lexiconData.length === 0) {
    if (empty) empty.style.display = '';
    return;
  }
  if (empty) empty.style.display = 'none';

  grid.innerHTML = '';
  lexiconData.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'lex-card';
    card.style.animationDelay = (i * 0.04) + 's';
    card.innerHTML = `
      <div class="lex-emoji">${w.emoji || '📝'}</div>
      <div class="lex-jp">${w.jp || w.rom}</div>
      <div class="lex-romaji">${w.rom}</div>`;
    card.onclick = () => speak(w.jp || w.rom);
    grid.appendChild(card);
  });
}

function toggleLexicon() {
  document.getElementById('lexicon').classList.toggle('open');
}

// ══════════════════════════════════════════════════════════
// ANNOTATE JAPANESE
// Returns DOM fragment with ruby annotations for new words
// ══════════════════════════════════════════════════════════
function annotateJP(parts) {
  const container = document.createElement('span');
  parts.forEach(part => {
    if (!part.k) {
      container.appendChild(document.createTextNode(part.w));
      return;
    }
    const key = part.k.toLowerCase();
    const entry = VOCAB[key];
    const isNew = entry && !seenWords.has(key);

    if (entry && isNew) {
      const ruby = document.createElement('ruby');
      ruby.className = 'w-new';
      ruby.textContent = part.w;
      const rt = document.createElement('rt');
      rt.textContent = entry.en;
      ruby.appendChild(rt);
      container.appendChild(ruby);
      seenWords.add(key);
      // Add to lexicon if has emoji
      if (entry.emoji) addToLexicon(key);
    } else {
      const span = document.createElement('span');
      span.className = entry ? 'w-seen' : '';
      span.textContent = part.w;
      container.appendChild(span);
    }
  });
  return container;
}

// ══════════════════════════════════════════════════════════
// BUILD PLAIN TEXT from parts (for TTS)
// ══════════════════════════════════════════════════════════
function partsToText(parts) {
  return parts.map(p => p.w).join('');
}

// ══════════════════════════════════════════════════════════
// RENDER LEVEL — build all manga panels and scroll in
// ══════════════════════════════════════════════════════════
function renderLevel() {
  const lv = LEVELS[currentLevel];
  currentExchange = 0;
  busy = false;

  // Update HUD
  document.getElementById('scene-bg').style.backgroundImage = `url('${lv.bg}')`;
  document.getElementById('hud-lv').textContent = `LV ${String(lv.id).padStart(2,'0')}`;
  document.getElementById('hud-arc').textContent = lv.arc.split(':')[0].trim();
  document.getElementById('prog-fill').style.width = (lv.id / LEVELS.length * 100) + '%';
  document.getElementById('kibi-text').textContent = lv.kibi;

  // Clear scroll
  const scroll = document.getElementById('scroll-area');
  scroll.innerHTML = '';

  // ── Panel 1: Hero image — arc label, title, scroll hint only ──
  const pScene = document.createElement('div');
  pScene.className = 'manga-panel panel-scene';
  const sceneBg = document.createElement('div');
  sceneBg.className = 'panel-scene-bg';
  sceneBg.style.backgroundImage = `url('${lv.bg}')`;
  const sceneOverlay = document.createElement('div');
  sceneOverlay.className = 'panel-scene-overlay';
  const arcEl = document.createElement('div'); arcEl.className = 'panel-arc'; arcEl.textContent = lv.arc;
  const titleEl = document.createElement('div'); titleEl.className = 'panel-title'; titleEl.textContent = lv.title;
  const scrollHint = document.createElement('div'); scrollHint.className = 'panel-scene-scroll'; scrollHint.textContent = '▼ SCROLL TO BEGIN';
  sceneOverlay.append(arcEl, titleEl, scrollHint);
  pScene.append(sceneBg, sceneOverlay);
  scroll.appendChild(pScene);

  // ── Panel 2: Story text ──
  const pStory = document.createElement('div');
  pStory.className = 'manga-panel panel-story-block';
  const storyEl = document.createElement('div'); storyEl.className = 'panel-story-text'; storyEl.textContent = lv.story;
  pStory.appendChild(storyEl);
  scroll.appendChild(pStory);

  // ── Panel 3: KIBI context note ──
  const pCtx = document.createElement('div');
  pCtx.className = 'manga-panel panel-context';
  const ctxLabel = document.createElement('div');
  ctxLabel.className = 'panel-context-label';
  ctxLabel.textContent = '📡 KIBI LANGUAGE NOTE';
  const ctxText = document.createElement('div');
  ctxText.className = 'panel-context-text';
  ctxText.textContent = lv.context;
  pCtx.append(ctxLabel, ctxText);
  scroll.appendChild(pCtx);

  // ── Render first exchange only when user scrolls to context panel ──
  // IntersectionObserver fires once context panel is 60% visible
  const observer = new IntersectionObserver((entries, obs) => {
    if (entries[0].isIntersecting) {
      obs.disconnect();
      renderExchange(scroll, lv);
    }
  }, { threshold: 0.6 });
  observer.observe(pCtx);

  // Scroll to top of hero
  scroll.scrollTop = 0;
}

// ══════════════════════════════════════════════════════════
// RENDER EXCHANGE — adds speech bubble + choice panels
// ══════════════════════════════════════════════════════════
function renderExchange(scroll, lv) {
  const ex = lv.exchanges[currentExchange];
  const totalEx = lv.exchanges.length;

  // ── Speech bubble panel ──
  const pSpeech = document.createElement('div');
  pSpeech.className = 'manga-panel panel-speech';

  const isPlayer = ex.avatarClass === 'player';
  const bubbleRow = document.createElement('div');
  bubbleRow.className = 'bubble-row' + (isPlayer ? ' player' : '');

  // Avatar
  const av = document.createElement('div');
  av.className = 'avatar ' + (ex.avatarClass || '');
  av.textContent = ex.avatar;
  bubbleRow.appendChild(av);

  // Bubble
  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // Speaker label
  const spkLabel = document.createElement('div');
  spkLabel.className = 'bubble-speaker';
  spkLabel.textContent = ex.speaker;
  bubble.appendChild(spkLabel);

  // Japanese text
  const jpEl = document.createElement('div');
  jpEl.className = 'bubble-jp';
  const jpText = partsToText(ex.jp);
  jpEl.appendChild(annotateJP(ex.jp));
  bubble.appendChild(jpEl);

  // Audio button — always rendered, speak() handles gracefully if TTS unavailable
  const audioBtn = document.createElement('div');
  audioBtn.className = 'audio-btn';
  audioBtn.textContent = ' TAP TO HEAR';
  audioBtn.onclick = (e) => {
    e.stopPropagation();
    audioBtn.classList.add('playing');
    speak(jpText);
    setTimeout(() => audioBtn.classList.remove('playing'), 2000);
  };
  bubble.appendChild(audioBtn);

  // Click whole bubble to speak
  bubble.onclick = () => speak(jpText);
  bubble.title = 'Tap to hear';

  bubbleRow.appendChild(bubble);
  pSpeech.appendChild(bubbleRow);

  // Exchange counter (if multi-exchange)
  if (totalEx > 1) {
    const pip = document.createElement('div');
    pip.style.cssText = 'display:flex;gap:0.3rem;justify-content:center;margin-top:0.5rem;';
    for (let i = 0; i < totalEx; i++) {
      const dot = document.createElement('div');
      dot.style.cssText = `width:6px;height:6px;border-radius:50%;transition:all 0.3s;background:${i < currentExchange ? 'var(--cyan)' : i === currentExchange ? 'var(--pink)' : 'rgba(255,255,255,0.15)'};`;
      pip.appendChild(dot);
    }
    pSpeech.appendChild(pip);
  }

  scroll.appendChild(pSpeech);

  // ── Choice panel ──
  const pChoices = document.createElement('div');
  pChoices.className = 'manga-panel panel-choices';

  // Prompt
  const promptBar = document.createElement('div');
  promptBar.className = 'prompt-bar';
  promptBar.textContent = ex.prompt;
  pChoices.appendChild(promptBar);

  // Grid
  const grid = document.createElement('div');
  grid.className = 'choices-grid ' + (ex.type === 'visual' ? 'visual' : 'text');
  pChoices.appendChild(grid);

  // Feedback bar
  const fbBar = document.createElement('div');
  fbBar.className = 'feedback-bar';
  pChoices.appendChild(fbBar);

  // Build choices — shuffle so correct answer position varies
  const shuffled = [...ex.choices].sort(() => Math.random() - 0.5);
  shuffled.forEach(ch => {
    const btn = document.createElement(ex.type === 'visual' ? 'div' : 'button');
    btn.className = ex.type === 'visual' ? 'choice-visual' : 'choice-text';

    if (ex.type === 'visual') {
      btn.innerHTML = `<div class="emoji">${ch.emoji}</div><div>${ch.label}</div>`;
    } else {
      btn.textContent = ch.text;
    }

    btn.onclick = () => handleChoice(btn, ch, grid, fbBar, scroll, lv);
    grid.appendChild(btn);
  });

  scroll.appendChild(pChoices);

  // Only scroll to new content for exchange 2+ (first exchange user scrolls to naturally)
  if (currentExchange > 0) {
    setTimeout(() => {
      pSpeech.scrollIntoView({behavior:'smooth', block:'start'});
    }, 150);
  }
}

// ══════════════════════════════════════════════════════════
// HANDLE CHOICE
// ══════════════════════════════════════════════════════════
function handleChoice(btn, ch, grid, fbBar, scroll, lv) {
  if (busy) return;

  if (ch.correct) {
    busy = true;
    btn.classList.add('correct');
    grid.querySelectorAll('.choice-visual, .choice-text').forEach(b => {
      b.style.pointerEvents = 'none';
    });
    fbBar.textContent = ch.feedback;
    fbBar.className = 'feedback-bar good';

    // Check if this is the LAST exchange AND last level (completion)
    const isLastLevel = currentLevel >= LEVELS.length - 1;
    const isLastExchange = currentExchange >= lv.exchanges.length - 1;

    if (isLastLevel && isLastExchange && (ch.feedback.includes('KIZUNA COMPLETE') || ch.feedback.includes('Congratulations'))) {
      setTimeout(() => showToast('🎌', ch.feedback, null), 1200);
      return;
    }

    setTimeout(() => {
      busy = false;
      if (currentExchange < lv.exchanges.length - 1) {
        currentExchange++;
        renderExchange(scroll, lv);
      } else {
        // Level complete — go to next
        if (currentLevel < LEVELS.length - 1) {
          currentLevel++;
          renderLevel();
        } else {
          showToast('🎌', 'KIZUNA COMPLETE\n\nYou saved Tokyo.\nYou made bonds that last.\n\nおめでとう\nOmedetou — Congratulations.\n\nYou started knowing nothing.\nYou finish speaking Japanese.\nThat is real.', null);
        }
      }
    }, 1500);

  } else {
    // Wrong — shake, nudge, disable this button
    btn.classList.add('wrong');
    fbBar.textContent = ch.nudge || 'Not quite — try again!';
    fbBar.className = 'feedback-bar bad';
    setTimeout(() => {
      btn.classList.remove('wrong');
      btn.style.opacity = '0.3';
      btn.style.pointerEvents = 'none';
    }, 600);
  }
}

// ══════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════
function showToast(icon, text, cb) {
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-text').textContent = text;
  document.getElementById('toast').classList.add('show');
  toastCb = cb;
}
function dismissToast() {
  document.getElementById('toast').classList.remove('show');
  if (toastCb) { toastCb(); toastCb = null; }
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
initTTS();
renderLexicon();
renderLevel();
</script>
